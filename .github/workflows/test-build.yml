name: Test Build (Windows)
# Manually triggered from Actions → "Test Build (Windows)" → Run workflow.
# Builds the Windows installer + portable zip and uploads them as downloadable
# artifacts on the run page. No release is created. Use this to validate any
# workflow changes before tagging a real release.

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Optional notes for this test run'
        required: false
        default: ''

jobs:
  build-windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Build app — first pass
        run: bunx electrobun build --env=stable

      - name: Embed icon into launcher
        shell: pwsh
        run: |
          $rcedit = "node_modules\rcedit\bin\rcedit-x64.exe"
          & $rcedit "node_modules\electrobun\dist-win-x64\launcher.exe" --set-icon "assets\icon.ico"
          if ($LASTEXITCODE -ne 0) { Write-Error "rcedit failed on launcher.exe"; exit 1 }
          Write-Host "Icon embedded into launcher.exe"

      - name: Build app — second pass (with icon-embedded launcher)
        run: bunx electrobun build --env=stable

      - name: Embed icon into installer exe
        shell: pwsh
        run: |
          $rcedit = "node_modules\rcedit\bin\rcedit-x64.exe"
          & $rcedit "build\stable-win-x64\AgentDesk-Setup.exe" --set-icon "assets\icon.ico"
          if ($LASTEXITCODE -ne 0) { Write-Error "rcedit failed on AgentDesk-Setup.exe"; exit 1 }
          Write-Host "Icon embedded into AgentDesk-Setup.exe"

      - name: Build installer zip
        shell: pwsh
        run: |
          $dir     = "build/stable-win-x64"
          $staging = "$dir/.installer-staging"
          New-Item -ItemType Directory -Force -Path "$staging/.installer" | Out-Null
          Copy-Item "$dir/AgentDesk-Setup.exe"           "$staging/AgentDesk-Setup.exe"
          Copy-Item "$dir/AgentDesk-Setup.metadata.json" "$staging/.installer/AgentDesk-Setup.metadata.json"
          Copy-Item "$dir/AgentDesk-Setup.tar.zst"       "$staging/.installer/AgentDesk-Setup.tar.zst"
          Compress-Archive -Path "$staging/*" -DestinationPath "$dir/AgentDesk-win-x64-Setup.zip" -Force
          Remove-Item -Recurse -Force "$staging"
          Write-Host "Installer zip created."

      # Portable build: extract the app bundle then rezip without the installer.
      # Uses C:\Windows\System32\tar.exe (libarchive, zstd-capable on Server 2022).
      - name: Build portable zip
        shell: pwsh
        run: |
          $dir     = "build/stable-win-x64"
          $staging = "build/portable-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          C:\Windows\System32\tar.exe -xf "$dir/AgentDesk-Setup.tar.zst" -C $staging
          if ($LASTEXITCODE -ne 0) { Write-Error "tar extraction failed"; exit 1 }
          Compress-Archive -Path "$staging/*" -DestinationPath "$dir/AgentDesk-win-x64-portable.zip" -Force
          Remove-Item -Recurse -Force $staging
          Write-Host "Portable zip created."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-${{ github.sha }}
          path: |
            build/stable-win-x64/AgentDesk-win-x64-Setup.zip
            build/stable-win-x64/AgentDesk-win-x64-portable.zip
          retention-days: 7
