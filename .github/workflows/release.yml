name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Create the GitHub Release first so parallel build jobs can upload to it ──
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Extract tag name
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # ── Windows x64 build ──────────────────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      # A single pass is enough now: electrobun.config.ts's scripts.postBuild
      # (scripts/postbuild-win-icon.ts) embeds the icon into launcher.exe/
      # bun.exe itself, directly inside this build's own output folder,
      # before Electrobun tars/packages it — no need to pre-seed
      # node_modules/electrobun's copy and rebuild a second time to pick it
      # up. (That two-pass dance existed because Electrobun's OWN built-in
      # build.win.icon embed step fails on Windows — its precompiled CLI
      # binary's require.resolve("rcedit") resolves against ITS OWN CI
      # checkout path, not this project's node_modules — postbuild-win-
      # icon.ts redoes the same rcedit call as a plain `bun` process instead,
      # where require.resolve works correctly.)
      - name: Build app
        run: bunx electrobun build --env=stable

      - name: Embed icon into installer exe
        shell: pwsh
        run: |
          $rcedit = "node_modules\rcedit\bin\rcedit-x64.exe"
          & $rcedit "build\stable-win-x64\AgentDesk-Setup.exe" --set-icon "assets\icon.ico"
          if ($LASTEXITCODE -ne 0) { Write-Error "rcedit failed on AgentDesk-Setup.exe"; exit 1 }
          Write-Host "Icon embedded into AgentDesk-Setup.exe"

      # Strip Electrobun's unused updater binaries (bspatch.exe + zig-zstd.exe) from the
      # canonical Setup payload. AgentDesk's Windows updater is full-zip based and never
      # invokes the native bsdiff/zstd path, so both are dead weight (bspatch also trips
      # some AV engines) and neither is a startup dep. The metadata.json `hash` is the
      # build identity, NOT a payload checksum, and the self-extractor performs no
      # integrity check — so the tar.zst can be repacked without rehashing. We re-tar with
      # the same System32 tar and recompress with Electrobun's OWN zig-zstd, so the stream
      # is byte-format-identical to what the extractor expects. Doing this on the canonical
      # AgentDesk-Setup.tar.zst means the Setup zip, the updater tarball, AND the portable
      # zip all inherit the stripped payload from one place.
      # NOTE: the payload's top level is <bundleName>/bin/… (one level down), so the strip
      # must recurse — a $staging/bin/* match would silently no-op.
      - name: Strip unused updater binaries from Setup payload
        shell: pwsh
        run: |
          $dir  = "build/stable-win-x64"
          $zst  = "$dir/AgentDesk-Setup.tar.zst"
          $work = "build/setup-repack"
          $tar  = "build/setup-repack.tar"
          $zstd = "node_modules/electrobun/dist-win-x64/zig-zstd.exe"
          if (-not (Test-Path $zstd)) { Write-Error "zig-zstd.exe not found at $zstd"; exit 1 }

          # 1. Extract the payload (top level is <bundleName>/bin, <bundleName>/Resources, …)
          Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $work | Out-Null
          C:\Windows\System32\tar.exe -xf $zst -C $work
          if ($LASTEXITCODE -ne 0) { Write-Error "payload extract failed"; exit 1 }

          # 2. Strip the unused binaries wherever they sit under the bundle
          Get-ChildItem -Path $work -Recurse -Include bspatch.exe,zig-zstd.exe | Remove-Item -Force

          # 3. Re-tar with the identical layout: a single top-level bundle folder
          $bundleDir = (Get-ChildItem -Path $work -Directory | Select-Object -First 1).Name
          if (-not $bundleDir) { Write-Error "could not find bundle folder in payload"; exit 1 }
          Remove-Item -Force $tar -ErrorAction SilentlyContinue
          C:\Windows\System32\tar.exe -cf $tar -C $work $bundleDir
          if ($LASTEXITCODE -ne 0) { Write-Error "re-tar failed"; exit 1 }

          # 4. Recompress with Electrobun's own zig-zstd (extractor-compatible format)
          Remove-Item -Force $zst
          & $zstd compress -i $tar -o $zst --threads max
          if ($LASTEXITCODE -ne 0) { Write-Error "zstd recompress failed"; exit 1 }

          # 5. VERIFY: re-extract and assert the binaries are gone but the app is intact.
          # Fails the build (and thus the release) if the repack went wrong.
          $verify = "build/setup-verify"
          Remove-Item -Recurse -Force $verify -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $verify | Out-Null
          C:\Windows\System32\tar.exe -xf $zst -C $verify
          if ($LASTEXITCODE -ne 0) { Write-Error "VERIFY: re-extract failed"; exit 1 }
          if (Get-ChildItem -Path $verify -Recurse -Include bspatch.exe,zig-zstd.exe) {
            Write-Error "VERIFY: updater binaries still present after repack"; exit 1
          }
          if (-not (Get-ChildItem -Path $verify -Recurse -Filter launcher.exe)) {
            Write-Error "VERIFY: launcher.exe missing after repack — bundle damaged"; exit 1
          }
          Write-Host "Setup payload repacked without bspatch.exe / zig-zstd.exe (verified)"

          # 6. Cleanup
          Remove-Item -Recurse -Force $work, $verify -ErrorAction SilentlyContinue
          Remove-Item -Force $tar -ErrorAction SilentlyContinue

      # Bundle exe + archive into a single zip so users download one file.
      # Layout mirrors what electrobun's wrapWindowsInstallerInZip produces:
      #   AgentDesk-Setup.zip
      #   ├── AgentDesk-Setup.exe          ← user runs this
      #   └── .installer/
      #       ├── AgentDesk-Setup.metadata.json
      #       └── AgentDesk-Setup.tar.zst
      # Also rename files to the flat prefix-based names the updater expects:
      #   {baseUrl}/stable-win-x64-update.json          ← checked by Updater.checkForUpdate()
      #   {baseUrl}/stable-win-x64-AgentDesk.tar.zst     ← downloaded by Updater.downloadUpdate()
      - name: Prepare distribution files
        shell: pwsh
        run: |
          $dir = "build/stable-win-x64"

          # Build single-zip installer for user distribution
          $staging = "$dir/.installer-staging"
          New-Item -ItemType Directory -Force -Path "$staging/.installer" | Out-Null
          Copy-Item "$dir/AgentDesk-Setup.exe"           "$staging/AgentDesk-Setup.exe"
          Copy-Item "$dir/AgentDesk-Setup.metadata.json" "$staging/.installer/AgentDesk-Setup.metadata.json"
          Copy-Item "$dir/AgentDesk-Setup.tar.zst"       "$staging/.installer/AgentDesk-Setup.tar.zst"
          Compress-Archive -Path "$staging/*" -DestinationPath "$dir/AgentDesk-win-x64-Setup.zip" -Force
          Remove-Item -Recurse -Force "$staging"

          # update.json for Updater.checkForUpdate()
          # Inject version from the git tag (strips leading 'v') so Updater.checkForUpdate()
          # can return a non-undefined version string for the UI to display.
          $tag     = "${{ needs.create-release.outputs.tag }}"
          $semver  = $tag -replace '^v', ''
          $meta    = Get-Content "$dir/AgentDesk-Setup.metadata.json" | ConvertFrom-Json
          $meta | Add-Member -NotePropertyName 'version' -NotePropertyValue $semver -Force
          $meta | ConvertTo-Json -Compress | Set-Content "$dir/stable-win-x64-update.json"
          # Renamed tarball for Updater.downloadUpdate()
          Copy-Item "$dir/AgentDesk-Setup.tar.zst" "$dir/stable-win-x64-AgentDesk.tar.zst"

      # Portable build: extract the app bundle (tar.zst) into a plain folder and zip
      # it. No installer required — users just extract the zip and run the exe directly.
      # Uses C:\Windows\System32\tar.exe (libarchive, zstd-capable on Server 2022 runners).
      - name: Build portable zip
        shell: pwsh
        run: |
          $dir      = "build/stable-win-x64"
          $staging  = "build/portable-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          # The canonical AgentDesk-Setup.tar.zst was already stripped of the unused updater
          # binaries upstream ("Strip unused updater binaries from Setup payload"), so the
          # portable zip inherits the clean payload — no per-zip strip needed here.
          C:\Windows\System32\tar.exe -xf "$dir/AgentDesk-Setup.tar.zst" -C $staging
          if ($LASTEXITCODE -ne 0) { Write-Error "tar extraction failed"; exit 1 }
          Compress-Archive -Path "$staging/*" -DestinationPath "$dir/AgentDesk-win-x64-portable.zip" -Force
          Remove-Item -Recurse -Force $staging
          Write-Host "Portable zip created: $dir/AgentDesk-win-x64-portable.zip"

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            build/stable-win-x64/AgentDesk-win-x64-Setup.zip
            build/stable-win-x64/AgentDesk-win-x64-portable.zip
            build/stable-win-x64/stable-win-x64-update.json
            build/stable-win-x64/stable-win-x64-AgentDesk.tar.zst
          fail_on_unmatched_files: true

  # ── macOS arm64 build (Apple Silicon) ──────────────────────────────────────
  build-macos-arm64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Build app (Electrobun stable)
        run: bunx electrobun build --env=stable

      - name: Prepare distribution files
        run: |
          set -e
          dir="build/stable-macos-arm64"

          # metadata.json is at Contents/Resources/metadata.json on macOS
          metadata="$dir/AgentDesk.app/Contents/Resources/metadata.json"
          echo "App metadata: $(cat $metadata)"

          # update.json — fetched by Updater.checkForUpdate()
          # Inject version from git tag so the UI can display it correctly.
          semver="${{ needs.create-release.outputs.tag }}"
          semver="${semver#v}"
          jq --arg v "$semver" '. + {version: $v}' "$metadata" > "$dir/stable-macos-arm64-update.json"

          # tar.zst — downloaded by Updater.downloadUpdate()
          tar -cf - -C "$dir" "AgentDesk.app" | zstd --stdout > "$dir/stable-macos-arm64-AgentDesk.app.tar.zst"

          # zip — for users to download and drag to /Applications
          cd "$dir" && zip -r "AgentDesk-mac-arm64.zip" "AgentDesk.app" && cd -

      - name: Upload macOS arm64 artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            build/stable-macos-arm64/AgentDesk-mac-arm64.zip
            build/stable-macos-arm64/stable-macos-arm64-update.json
            build/stable-macos-arm64/stable-macos-arm64-AgentDesk.app.tar.zst
          fail_on_unmatched_files: true

  # Intel (x64) macOS build intentionally omitted — macos-13 runners have very
  # long queue times on GitHub Actions. Apple Silicon covers the vast majority
  # of current Mac users. Re-add build-macos-x64 here if Intel support is needed.

  # ── Linux x64 build ───────────────────────────────────────────────────────────
  # CEF is bundled (see electrobun.config.ts linux.bundleCEF: true) — larger
  # download but required because WebKitGTK has significant limitations.
  # Note: ApplicationMenu and ContextMenu are no-ops on Linux (Electrobun limitation)
  # but AgentDesk only calls setApplicationMenu([]) to clear it, so no functional loss.
  build-linux-x64:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run vite build

      - name: Install zstd
        run: sudo apt-get install -y zstd

      - name: Build app (Electrobun stable)
        run: bunx electrobun build --env=stable

      - name: Prepare distribution files
        run: |
          set -e
          dir="build/stable-linux-x64"

          semver="${{ needs.create-release.outputs.tag }}"
          semver="${semver#v}"

          # ── Source of truth ──────────────────────────────────────────────────
          # Electrobun does NOT leave its final deliverables in the build folder.
          # It renames them into the project-root "artifacts/" folder (its default
          # `artifactFolder`) with a "<channel>-<os>-<arch>-" prefix. The genuine
          # *runtime* app bundle (the one whose bin/launcher is the real 92KB
          # static launcher, NOT the self-extractor) is:
          #     artifacts/stable-linux-x64-AgentDesk.tar.zst
          # The leftover build/stable-linux-x64/AgentDesk/ directory is the
          # macOS-style self-extractor bundle and must NOT be shipped on Linux —
          # its launcher only self-extracts from a single appended-archive binary.
          runtime_zst="artifacts/stable-linux-x64-AgentDesk.tar.zst"
          if [ ! -f "$runtime_zst" ]; then
            echo "ERROR: runtime tarball not found at $runtime_zst"
            echo "--- artifacts/ ---";        ls -la artifacts/ || true
            echo "--- $dir ---";              ls -la "$dir" || true
            exit 1
          fi

          # update.json for Updater.checkForUpdate().
          # Built from the bundle's metadata.json (has identifier/name/channel/hash,
          # same shape the macOS/Windows jobs use) with the tag version injected.
          metadata=$(find "$dir" -name "metadata.json" | head -1)
          echo "Metadata: $metadata"
          jq --arg v "$semver" '. + {version: $v}' "$metadata" > "$dir/stable-linux-x64-update.json"

          # Updater tarball — electrobun's canonical runtime bundle, used as-is.
          cp "$runtime_zst" "$dir/stable-linux-x64-AgentDesk.tar.zst"

          # Portable tar.gz for direct user download. We ship the already-unpacked
          # runtime bundle so users just `tar -xzf` and run ./AgentDesk/bin/launcher
          # directly — no self-extraction step. This deliberately avoids electrobun's
          # Linux self-extracting installer, whose embedded tar reader rejects some
          # archive entries (TarUnsupportedFileType).
          staging="build/linux-portable-staging"
          rm -rf "$staging"; mkdir -p "$staging"
          zstd -d "$runtime_zst" -o "$staging/app.tar"
          tar -xf "$staging/app.tar" -C "$staging"
          rm -f "$staging/app.tar"
          tar -czf "$dir/AgentDesk-linux-x64.tar.gz" -C "$staging" .
          rm -rf "$staging"

          echo "Linux artifacts prepared:"
          ls -la "$dir/stable-linux-x64-AgentDesk.tar.zst" \
                 "$dir/stable-linux-x64-update.json" \
                 "$dir/AgentDesk-linux-x64.tar.gz"

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            build/stable-linux-x64/AgentDesk-linux-x64.tar.gz
            build/stable-linux-x64/stable-linux-x64-update.json
            build/stable-linux-x64/stable-linux-x64-AgentDesk.tar.zst
          fail_on_unmatched_files: true
